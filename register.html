<!DOCTYPE html>
<html lang="en" data-bs-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investor Registration | Vertex Commercial</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏢</text></svg>">
  
  <!-- Bootstrap 5 CSS via CDN -->
  <link id="bootstrap-cdn" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body class="bg-offset">

  <!-- Top-Right Controls only: NO global header or footer -->
  <div class="position-absolute top-0 end-0 p-3 d-flex gap-2">
    <button id="theme-toggle" class="btn btn-outline-custom btn-custom py-2 px-3" title="Toggle Theme" aria-label="Toggle Theme">
          <i class="fa-solid fa-moon fs-5"></i>
        </button>
    <button id="rtl-toggle" class="btn btn-outline-custom btn-custom py-2 px-3" title="Toggle RTL" aria-label="Toggle RTL">
          <span>RTL</span>
        </button>
  </div>

  <!-- Form Card Centered vertical stack layout -->
  <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
    <div class="card p-4 border-0 shadow-lg w-100" style="max-width: 480px; border-radius: var(--border-radius-card); background-color: var(--card-bg);">
      <div class="text-center mb-4">
        <!-- Site Logo identical to main logo -->
        <a href="index.html" class="d-inline-block text-primary-custom" style="color: var(--primary-color);">
          <svg width="180" height="50" viewBox="0 0 180 50" fill="none" xmlns="http://www.w3.org/2000/svg" class="align-middle">
            <path d="M10 40V15L22 5L34 15V40" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
            <path d="M16 40V22H28V40" stroke="currentColor" stroke-width="2"/>
            <path d="M22 10V15" stroke="currentColor" stroke-width="2"/>
            <line x1="5" y1="40" x2="39" y2="40" stroke="currentColor" stroke-width="2.5"/>
            <text x="46" y="28" font-family="'Outfit', sans-serif" font-weight="700" font-size="21" fill="currentColor">VERTEX</text>
            <text x="46" y="42" font-family="'Outfit', sans-serif" font-weight="500" font-size="10" fill="currentColor" letter-spacing="1.5">COMMERCIAL</text>
          </svg>
        </a>
        <h2 class="h3 mt-3">Investor Registration</h2>
        <p class="text-muted small">Access exclusive deals and encrypted deal rooms. No demo credentials pre-filled.</p>
      </div>

      <form class="needs-validation" novalidate id="register-form">
        <!-- Username/Corporate Entity -->
        <div class="mb-3">
          <label for="reg-username" class="form-label font-weight-bold">Corporate Entity Name</label>
          <input type="text" class="form-control" id="reg-username" placeholder="e.g. Acme Capital Partners" required>
        </div>

        <!-- Corporate Email -->
        <div class="mb-3">
          <label for="reg-email" class="form-label font-weight-bold">Corporate Email Address</label>
          <input type="email" class="form-control" id="reg-email" placeholder="name@acmecapital.com" required>
        </div>

        <!-- Password input with visibility eye-toggle -->
        <div class="mb-3">
          <label for="reg-password" class="form-label font-weight-bold">Select Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="reg-password" required>
            <button class="btn btn-outline-secondary" type="button" id="password-toggle">
              <i class="fa-solid fa-eye" id="password-toggle-icon"></i>
            </button>
          </div>
        </div>

        <!-- Terms Agreement -->
        <div class="form-check mb-4">
          <input type="checkbox" class="form-check-input" id="terms-agree" required>
          <label class="form-check-label small" for="terms-agree">I certify that I am a qualified institutional buyer and agree to the platform Terms of Service.</label>
        </div>

        <!-- 100% width CTA button -->
        <button type="submit" class="btn btn-primary-custom btn-custom w-100 py-2 mb-3">Create Investor Account</button>

        <!-- Social Logins (Google / Apple) -->
        <div class="text-center my-3">
          <span class="text-muted small">Or register with</span>
        </div>
        <div class="row g-2 mb-4">
          <div class="col-6">
            <button type="button" class="btn btn-outline-secondary w-100 py-2 small"><i class="fa-brands fa-google me-2"></i>Google</button>
          </div>
          <div class="col-6">
            <button type="button" class="btn btn-outline-secondary w-100 py-2 small"><i class="fa-brands fa-apple me-2"></i>Apple</button>
          </div>
        </div>

        <div class="text-center">
          <span class="small text-muted">Already registered? <a href="login.html" class="text-secondary-custom" style="color: var(--secondary-color);">Login Here</a></span>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    // Eye-toggle password visibility
    const pwInput = document.getElementById('reg-password');
    const pwToggle = document.getElementById('password-toggle');
    const pwIcon = document.getElementById('password-toggle-icon');

    if (pwToggle && pwInput) {
      pwToggle.addEventListener('click', () => {
        if (pwInput.type === 'password') {
          pwInput.type = 'text';
          pwIcon.classList.remove('fa-eye');
          pwIcon.classList.add('fa-eye-slash');
        } else {
          pwInput.type = 'password';
          pwIcon.classList.remove('fa-eye-slash');
          pwIcon.classList.add('fa-eye');
        }
      });
    }

    // Handle form submit redirecting to profile page
    const registerForm = document.getElementById('register-form');
    if(registerForm) {
      registerForm.addEventListener('submit', (e) => {
        if(registerForm.checkValidity()) {
          e.preventDefault();
          window.location.href = 'dashboard-user-profile.html';
        }
      });
    }
  </script>
</body>
</html>
